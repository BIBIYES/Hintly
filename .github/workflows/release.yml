name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            goarm: ''
            goarm_label: ''
            ext: .exe
            archive: zip
          - goos: windows
            goarch: 386
            goarm: ''
            goarm_label: ''
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            goarm: ''
            goarm_label: ''
            ext: .exe
            archive: zip
          - goos: darwin
            goarch: amd64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: amd64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: 386
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm
            goarm: '7'
            goarm_label: v7
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: ppc64le
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: s390x
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: riscv64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        id: pack
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail

          version="${{ steps.meta.outputs.version }}"
          target="${GOOS}-${GOARCH}"
          if [ -n "${GOARM:-}" ]; then
            target="${target}v${GOARM}"
          fi

          build_dir="dist/${target}"
          mkdir -p "${build_dir}"

          bin_name="hint${{ matrix.ext }}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "${build_dir}/${bin_name}" ./cmd/hint
          cp README.md "${build_dir}/README.md"

          package_name="hint_${version}_${target}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd "${build_dir}"
              zip -q "../${package_name}.zip" "${bin_name}" README.md
            )
            asset_path="dist/${package_name}.zip"
          else
            tar -C "${build_dir}" -czf "dist/${package_name}.tar.gz" "${bin_name}" README.md
            asset_path="dist/${package_name}.tar.gz"
          fi

          echo "asset=${asset_path}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm_label }}
          path: ${{ steps.pack.outputs.asset }}
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksum file
        run: |
          set -euo pipefail
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > dist/checksums.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt

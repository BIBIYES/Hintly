name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm_label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            goarm: ''
            goarm_label: ''
            ext: .exe
            archive: zip
          - goos: windows
            goarch: 386
            goarm: ''
            goarm_label: ''
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            goarm: ''
            goarm_label: ''
            ext: .exe
            archive: zip
          - goos: darwin
            goarch: amd64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: amd64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: 386
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm
            goarm: '7'
            goarm_label: v7
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: ppc64le
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: s390x
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: riscv64
            goarm: ''
            goarm_label: ''
            ext: ''
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        id: pack
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail

          version="${{ steps.meta.outputs.version }}"
          target="${GOOS}-${GOARCH}"
          if [ -n "${GOARM:-}" ]; then
            target="${target}v${GOARM}"
          fi

          build_dir="dist/${target}"
          mkdir -p "${build_dir}"

          # Auto-detect main package to avoid hard-coded project layout.
          main_pkg="$(go list -f '{{if eq .Name "main"}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d' | head -n 1)"
          if [ -z "${main_pkg}" ]; then
            echo "No main package found. Repository tree:"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          bin_name="hint${{ matrix.ext }}"
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "${build_dir}/${bin_name}" "${main_pkg}"
          cp README.md "${build_dir}/README.md"

          package_name="hint_${version}_${target}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd "${build_dir}"
              zip -q "../${package_name}.zip" "${bin_name}" README.md
            )
            asset_path="dist/${package_name}.zip"
          else
            tar -C "${build_dir}" -czf "dist/${package_name}.tar.gz" "${bin_name}" README.md
            asset_path="dist/${package_name}.tar.gz"
          fi

          echo "asset=${asset_path}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm_label }}
          path: ${{ steps.pack.outputs.asset }}
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksum file
        run: |
          set -euo pipefail
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > dist/checksums.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          VERSION: ${{ steps.release_meta.outputs.version }}
          VERSION_NO_V: ${{ steps.release_meta.outputs.version_no_v }}
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "Missing secret: HOMEBREW_TAP_TOKEN"
            exit 1
          fi

          tap_repo="${HOMEBREW_TAP_REPO:-BIBIYES/homebrew-tap}"

          get_sha() {
            local file="$1"
            awk -v f="dist/${file}" '$2 == f {print $1}' dist/checksums.txt
          }

          darwin_amd64_file="hint_${VERSION}_darwin-amd64.tar.gz"
          darwin_arm64_file="hint_${VERSION}_darwin-arm64.tar.gz"
          linux_amd64_file="hint_${VERSION}_linux-amd64.tar.gz"
          linux_arm64_file="hint_${VERSION}_linux-arm64.tar.gz"

          darwin_amd64_sha="$(get_sha "${darwin_amd64_file}")"
          darwin_arm64_sha="$(get_sha "${darwin_arm64_file}")"
          linux_amd64_sha="$(get_sha "${linux_amd64_file}")"
          linux_arm64_sha="$(get_sha "${linux_arm64_file}")"

          for sha in \
            "${darwin_amd64_sha}" \
            "${darwin_arm64_sha}" \
            "${linux_amd64_sha}" \
            "${linux_arm64_sha}"; do
            if [ -z "${sha}" ]; then
              echo "Failed to resolve one or more SHA256 values from dist/checksums.txt"
              cat dist/checksums.txt
              exit 1
            fi
          done

          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repo}.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/hintly.rb <<EOF
          class Hintly < Formula
            desc "AI command assistant for terminal"
            homepage "https://github.com/BIBIYES/Hintly"
            version "${VERSION_NO_V}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/BIBIYES/Hintly/releases/download/v#{version}/hint_v#{version}_darwin-arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"
              else
                url "https://github.com/BIBIYES/Hintly/releases/download/v#{version}/hint_v#{version}_darwin-amd64.tar.gz"
                sha256 "${darwin_amd64_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/BIBIYES/Hintly/releases/download/v#{version}/hint_v#{version}_linux-arm64.tar.gz"
                sha256 "${linux_arm64_sha}"
              else
                url "https://github.com/BIBIYES/Hintly/releases/download/v#{version}/hint_v#{version}_linux-amd64.tar.gz"
                sha256 "${linux_amd64_sha}"
              end
            end

            def install
              bin.install "hint"
            end

            test do
              assert_predicate bin/"hint", :exist?
            end
          end
          EOF

          cd tap
          if git diff --quiet -- Formula/hintly.rb; then
            echo "No formula changes detected; skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hintly.rb
          git commit -m "chore: bump hintly to ${VERSION_NO_V}"

          default_branch="$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')"
          git push origin "HEAD:${default_branch}"
